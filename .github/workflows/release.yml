name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zip
        run: |
          mkdir -p build
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='.deployignore' \
            --exclude='.distignore' \
            . build/wp-mcp-plugin/
          cd build
          zip -r wp-mcp-plugin.zip wp-mcp-plugin/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/wp-mcp-plugin.zip
          generate_release_notes: true
